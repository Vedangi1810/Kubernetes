kind: Deployment
apiVersion: apps/v1
metadata: 
  name: backend-deployment
  namespace: chat-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      name: backend-pod
      namespace: chat-app
      labels:
        app: backend
    spec:
      containers:
        - name: chatapp-backend
          image: vedangi1018/chatapp-backend:latest
          ports:
          - containerPort: 5001 
          env:
          - name: MONGODB_URI
            value: "mongodb://root:root@mongodb:27017/chatApp?authSource=admin"
          - name: PORT
            value: "5001"
          - name: NODE_ENV
            value: "production"
          - name: JWT_SECRET
            valueFrom:
              secretKeyRef:
                name: chatapp-secrets
                key: jwt-secret
