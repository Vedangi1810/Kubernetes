kind: Role
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: apache-manager
  namespace: apache
rules:
  - apiGroups: ["","apps","batch","rbac.authorization.k8s.io"]
    resources: ["pods"]
    verbs: ["get","list","watch"]


# Pods belong to the core API group, NOT apps, NOT batch.
# Core API group is represented as:
# apiGroups: [""]
